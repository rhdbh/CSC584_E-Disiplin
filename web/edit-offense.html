<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Discipline Record | E-Disiplin</title>

    <link href="https://fonts.googleapis.com/css2?family=Tinos:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Tinos', serif;
            background: url("img/background.jpg") no-repeat center center;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .form-card {
            max-width: 800px;
            width: 100%;
        }

        .card-header {
            background-color: #ffc107;
            color: black;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="form-card">
    <div class="card shadow-lg border-0">

        <div class="card-header py-3">
            <h3 class="mb-0">Edit Discipline Record</h3>
        </div>
        <div class="card-body p-4">
            <form>
                <div class="mb-3">
                    <label class="form-label">Case ID</label>
                    <input type="text" class="form-control" value="DC001" readonly>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Student ID</label>
                        <input type="text" class="form-control" value="2026001">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text" class="form-control" value="Aizat Syahir">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Offense Type</label>
                    <select class="form-select">
                        <option selected>Smoking</option>
                        <option>Vandalism</option>
                        <option>Late Attendance</option>
                        <option>Fighting</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Incident Date</label>
                        <input type="date" class="form-control" value="2026-05-12">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Severity</label>
                        <select class="form-select">
                            <option>Minor</option>
                            <option selected>Major</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" rows="4">Student caught smoking inside campus area.</textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label">Status</label>
                    <select class="form-select">
                        <option selected>Pending Counseling</option>
                        <option>Completed</option>
                    </select>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a href="offense.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-warning">Update Record</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
