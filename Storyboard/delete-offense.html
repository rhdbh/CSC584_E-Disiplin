<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Discipline Record | E-Disiplin</title>

    <link href="https://fonts.googleapis.com/css2?family=Tinos:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Tinos', serif;
            background: url("img/background.jpg") no-repeat center center;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .delete-card {
            max-width: 600px;
            width: 100%;
        }

        .card-header {
            background-color: #dc3545;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="delete-card">
    <div class="card shadow-lg border-0">
        <div class="card-header py-3">
            <h3 class="mb-0">Delete Discipline Record</h3>
        </div>
        <div class="card-body text-center p-5">
            <div class="mb-4">
                <h4>Are you sure?</h4>
                <p class="text-muted">
                    You are about to delete the following discipline record:
                </p>
                <div class="alert alert-light border">

                    <strong>Case ID:</strong> DC001 <br>
                    <strong>Student:</strong> Aizat Syahir <br>
                    <strong>Offense:</strong> Smoking <br>
                    <strong>Date:</strong> 12/05/2026
                </div>
                <p class="text-danger">
                    This action cannot be undone.
                </p>
            </div>
            <div class="d-flex justify-content-center gap-2">
                <a href="offense.html" class="btn btn-secondary">
                    Cancel
                </a>
                <button class="btn btn-danger">
                    Delete Record
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
